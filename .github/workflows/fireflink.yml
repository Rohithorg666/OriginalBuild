name: Fireflink CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-jar-and-api:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Checkout repo
      # -------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------
      # Install dependencies
      # -------------------------------
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq wget openjdk-11-jdk
          java -version

      # -------------------------------
      # Start Spring Boot JAR
      # -------------------------------
      - name: Start JAR
        run: |
          JAR_FILE="${{ github.workspace }}/CICD_Fireflink.jar"
          echo "Starting JAR: $JAR_FILE"
          nohup java -jar "$JAR_FILE" --fireflinkV3Uri=https://app.v3.fireflink.com/ > server.log 2>&1 &

      # -------------------------------
      # Wait until JAR is live
      # -------------------------------
      - name: Wait for service
        run: |
          echo "Waiting for service on localhost:8193..."
          for i in {1..60}; do
            if curl -s http://localhost:8193 > /dev/null; then
              echo "Service started!"
              break
            fi
            echo "Waiting ($i/60)..."
            sleep 2
          done

      # -------------------------------
      # API CALL #1 - Get execId
      # -------------------------------
      - name: Trigger Execution API
        run: |
          RESPONSE=$(curl --location "http://localhost:8193/v3/defaultMachine" \
            --header "Content-Type: application/json" \
            --data '{
              "userName":"rohith.ks@fireflink.com",
              "password":"Password@123",
              "licId":"LIC1026518",
              "projectId":"PJT1008",
              "suiteID":"SUITE_694951be-79f4-4d33-b2eb-38556ee443e6",
              "waitConfig":{
                "terminateScriptIfTakesMoreTimeInHrs":"1",
                "terminateSuiteIfTakesMoreTimeInHrs":"1",
                "implicitWaitInSeconds":"30",
                "explicitlyWait":"30",
                "delayBetweenStepsInSeconds":"1"
              }
            }')

          echo "Full API Response:"
          echo "$RESPONSE"

          EXEC_ID=$(echo "$RESPONSE" | jq -r '.execId')

          echo "=============================="
          echo "EXECUTION ID: $EXEC_ID"
          echo "=============================="

          # Fail if execId not found
          if [ "$EXEC_ID" = "null" ] || [ -z "$EXEC_ID" ]; then
            echo "ERROR: execId not found!"
            exit 1
          fi

          echo "$EXEC_ID" > exec_id.txt

      # -------------------------------
      # API CALL #2 - Fetch Analytics
      # -------------------------------
      - name: Fetch Analytics
        run: |
          EXEC_ID=$(cat exec_id.txt)

          PASS_PERCENTAGE=$(curl --location "http://localhost:8193/result/v3/percentage" \
            --header "Content-Type: application/json" \
            --data "{
              \"userName\":\"rohith.ks@fireflink.com\",
              \"password\":\"Password@123\",
              \"projId\":\"PJT1008\",
              \"licId\":\"LIC1026518\",
              \"suiteId\":\"SUITE_694951be-79f4-4d33-b2eb-38556ee443e6\",
              \"execId\":\"$EXEC_ID\"
            }")

          echo "=============================="
          echo "PASS PERCENTAGE RESPONSE:"
          echo "$PASS_PERCENTAGE"
          echo "=============================="

          echo "$PASS_PERCENTAGE" > percentage.txt

      # -------------------------------
      # Upload artifacts
      # -------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fireflink-results
          path: |
            exec_id.txt
            server.log
            percentage.txt
